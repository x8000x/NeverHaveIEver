<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Never Have I Ever</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap');

  :root{
    --ink: #f6efe8;
    --ink-dim: #cdb8d8;
    --bg-1: #1c1030;
    --bg-2: #2a1745;
    --pink: #ff4d94;
    --pink-deep: #e0397f;
    --gold: #ffc857;
    --purple-card: #33194f;
    --purple-line: rgba(255,255,255,0.09);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    min-height:100%;
    background: transparent;
  }

  body{
    font-family: 'Manrope', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }

  .stage{
    width:100%;
    max-width: 520px;
    padding: 28px 20px 34px;
    position:relative;
    z-index:2;
  }

  /* Ambient confetti dots, fixed, decorative */
  .confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }
  .confetti span{
    position:absolute;
    border-radius:2px;
    opacity:0.55;
    animation: drift 14s linear infinite;
  }

  @keyframes drift{
    0%{ transform: translateY(-10vh) rotate(0deg); }
    100%{ transform: translateY(110vh) rotate(240deg); }
  }

  .brand{
    text-align:center;
    margin-bottom: 22px;
  }
  .brand .eyebrow{
    font-family:'Manrope';
    letter-spacing:0.32em;
    text-transform:uppercase;
    font-size:11px;
    color: var(--gold);
    font-weight:700;
    margin-bottom:6px;
  }
  .brand h1{
    font-family:'Baloo 2', sans-serif;
    font-size: 34px;
    line-height:1;
    margin:0;
    font-weight:800;
    letter-spacing: 0.5px;
  }
  .brand h1 .accent{ color: var(--pink); }

  /* Card stack signature element */
  .deck{
    position:relative;
    height: 280px;
    margin: 6px 0 22px;
  }
  .stack-card{
    position:absolute;
    inset:0;
    border-radius: 24px;
    background: linear-gradient(160deg, #3a1f5c, #26123f);
    border: 1px solid var(--purple-line);
  }
  .stack-card.s1{ transform: rotate(-6deg) translateY(10px); opacity:0.55; }
  .stack-card.s2{ transform: rotate(5deg) translateY(6px); opacity:0.75; }

  .card{
    position:absolute;
    inset:0;
    border-radius: 24px;
    background: linear-gradient(155deg, var(--purple-card), #24123c 78%);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 24px 50px -18px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
    padding: 26px 26px 22px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition: transform 0.42s cubic-bezier(.2,.8,.2,1), opacity 0.42s ease;
  }

  .card.exit-next{
    transform: translateX(-130%) rotate(-10deg);
    opacity:0;
  }
  .card.exit-pass{
    transform: translateY(120%) rotate(4deg) scale(0.92);
    opacity:0;
  }
  .card.enter{
    animation: cardIn 0.46s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes cardIn{
    from{ transform: translateY(18px) scale(0.97); opacity:0; }
    to{ transform: translateY(0) scale(1); opacity:1; }
  }

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .category-pill{
    font-size: 11px;
    font-weight:700;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: var(--gold);
    border: 1px solid rgba(255,200,87,0.35);
  }
  .counter{
    font-size:12px;
    color: var(--ink-dim);
    font-weight:600;
    font-variant-numeric: tabular-nums;
  }

  .question-wrap{
    flex:1;
    display:flex;
    align-items:center;
    padding: 18px 2px;
  }
  .prompt-lead{
    font-family:'Baloo 2';
    font-size: 15px;
    color: var(--pink);
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    display:block;
    margin-bottom:8px;
  }
  .question-text{
    font-family:'Baloo 2', sans-serif;
    font-size: clamp(22px, 6vw, 28px);
    line-height:1.28;
    font-weight:700;
    color: var(--ink);
  }

  .card-bottom .hint{
    font-size:12px;
    color: var(--ink-dim);
    text-align:center;
  }

  .controls{
    display:grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 12px;
    margin-top: 18px;
  }

  button{
    font-family:'Manrope';
    font-weight:700;
    font-size: 15px;
    border-radius: 16px;
    border: none;
    padding: 16px 14px;
    cursor:pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
    letter-spacing:0.01em;
  }
  button:active{ transform: scale(0.96); }
  button:focus-visible{
    outline: 3px solid var(--gold);
    outline-offset: 2px;
  }

  .btn-pass{
    background: transparent;
    color: var(--ink);
    border: 1.5px solid rgba(255,255,255,0.25);
  }
  .btn-pass:hover{ background: rgba(255,255,255,0.06); }

  .btn-next{
    background: linear-gradient(120deg, var(--pink), var(--pink-deep));
    color: #2a0f1e;
    box-shadow: 0 10px 24px -8px rgba(255,77,148,0.55);
  }
  .btn-next:hover{ filter: brightness(1.06); }

  .btn-icon{ font-size:16px; margin-right:6px; vertical-align:-2px; }

  .progress-row{
    margin-top: 18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .progress-track{
    flex:1;
    height:6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: linear-gradient(90deg, var(--gold), var(--pink));
    border-radius: 999px;
    transition: width 0.4s ease;
    width:0%;
  }
  .progress-label{
    font-size:11px;
    color: var(--ink-dim);
    font-weight:600;
    white-space:nowrap;
  }

  .reset-row{
    text-align:center;
    margin-top:14px;
  }
  .reset-link{
    background:none;
    border:none;
    color: var(--ink-dim);
    font-size:12px;
    text-decoration:underline;
    cursor:pointer;
    padding:6px;
  }
  .reset-link:hover{ color: var(--ink); }

  .empty-state{
    text-align:center;
    padding: 10px 6px;
  }
  .empty-state .question-text{ font-size:22px; }

  @media (prefers-reduced-motion: reduce){
    .card, .confetti span{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="confetti" id="confetti"></div>

<div class="stage">
  <div class="brand">
    <div class="eyebrow">The Party Game</div>
    <h1>Never Have I <span class="accent">Ever</span></h1>
  </div>

  <div class="deck">
    <div class="stack-card s1"></div>
    <div class="stack-card s2"></div>
    <div class="card" id="card">
      <div class="card-top">
        <span class="category-pill" id="category">Category</span>
        <span class="counter" id="counter">0 / 0</span>
      </div>
      <div class="question-wrap">
        <div>

        </div>
      </div>
      <div class="card-bottom">
        <div class="hint" id="hint">Done it? Sip up. Pass if it's not for you.</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-pass" id="passBtn"><span class="btn-icon">↻</span>Pass</button>
    <button class="btn-next" id="nextBtn"><span class="btn-icon">🍹</span>Sip &amp; Next</button>

  <div class="progress-row">

  </div>

  <div class="reset-row">
    <button class="reset-link" id="resetBtn">Start the deck over</button>

</div>

  const TOTAL = questions.length;

  // State: indices not yet "asked" (confirmed via Next). Passed questions go
  // back into this pool so they can come up again.
  let pool = [];
  let currentIndex = null; // index into `questions`
  let askedCount = 0;

  const els = {
    card: document.getElementById('card'),
    category: document.getElementById('category'),
    question: document.getElementById('question'),
    counter: document.getElementById('counter'),
    hint: document.getElementById('hint'),
    passBtn: document.getElementById('passBtn'),
    nextBtn: document.getElementById('nextBtn'),
    progressFill: document.getElementById('progressFill'),
    progressLabel: document.getElementById('progressLabel'),
    resetBtn: document.getElementById('resetBtn'),
  };

  function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame(){
    pool = shuffle(questions.map((_, i) => i));
    askedCount = 0;
    currentIndex = null;
    updateProgress();
    drawNext({animate:false});
  }

  // Pull a random question from the pool, avoiding an immediate repeat of
  // the current one when other options exist.
  function pickFromPool(avoidIndex){
    if(pool.length === 0) return null;
    if(pool.length === 1) return pool[0];

    let choiceSlot = Math.floor(Math.random() * pool.length);
    if(pool[choiceSlot] === avoidIndex){
      choiceSlot = (choiceSlot + 1) % pool.length;
    }
    const idx = pool[choiceSlot];
    pool.splice(choiceSlot, 1);
    return idx;
  }

  function updateProgress(){
    const pct = Math.round((askedCount / TOTAL) * 100);
    els.progressFill.style.width = pct + '%';
    els.progressLabel.textContent = askedCount + ' / ' + TOTAL + ' asked';
    els.counter.textContent = (TOTAL - pool.length) + ' seen';
  }

  function renderCard(idx){
    const item = questions[idx];
    els.category.textContent = item.cat;
    els.question.textContent = item.q;
  }

  function drawNext({animate}){
    const nextIdx = pickFromPool(currentIndex);

    if(nextIdx === null){
      showEmptyState();
      return;
    }

    currentIndex = nextIdx;
    renderCard(currentIndex);
    updateProgress();

    if(animate){
      els.card.classList.remove('enter');
      void els.card.offsetWidth; // restart animation
      els.card.classList.add('enter');
    }
  }

  function showEmptyState(){
    els.category.textContent = 'All done';
    els.question.textContent = "You've made it through the whole deck! Shuffle again to keep the night going.";
    els.hint.textContent = 'Tap "Start the deck over" below to reset.';
    els.counter.textContent = TOTAL + ' / ' + TOTAL;
    els.passBtn.disabled = true;
    els.nextBtn.disabled = true;
    els.passBtn.style.opacity = 0.5;
    els.nextBtn.style.opacity = 0.5;
  }

  function handleNext(){
    if(currentIndex === null) return;
    askedCount += 1;
    animateExit('exit-next', () => drawNext({animate:true}));
  }

  function handlePass(){
    if(currentIndex === null) return;
    // Put the current question back into the pool so it can be asked again.
    pool.push(currentIndex);
    animateExit('exit-pass', () => drawNext({animate:true}));
  }

  function animateExit(cls, onDone){
    els.card.classList.add(cls);
    setTimeout(() => {
      els.card.classList.remove(cls);
      onDone();
    }, 220);
  }

  function resetAll(){
    els.passBtn.disabled = false;
    els.nextBtn.disabled = false;
    els.passBtn.style.opacity = 1;
    els.nextBtn.style.opacity = 1;
    els.hint.textContent = "Done it? Sip up. Pass if it's not for you.";
    initGame();
  }

  els.nextBtn.addEventListener('click', handleNext);
  els.passBtn.addEventListener('click', handlePass);
  els.resetBtn.addEventListener('click', resetAll);

  // Ambient confetti
  (function confettiField(){
    const field = document.getElementById('confetti');
    const colors = ['#ff4d94', '#ffc857', '#8a5cf6', '#f6efe8'];
    const count = 18;
    for(let i = 0; i < count; i++){
      const s = document.createElement('span');
      const size = 4 + Math.random() * 5;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = (Math.random() * -100) + 'vh';
      s.style.background = colors[i % colors.length];
      s.style.animationDuration = (10 + Math.random() * 10) + 's';
      s.style.animationDelay = (Math.random() * -12) + 's';
      field.appendChild(s);
    }
  })();

  initGame();
})();
